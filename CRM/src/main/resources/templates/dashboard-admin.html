<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Admin Dashboard – CRM Portal</title>

	<!-- Fonts -->
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
		rel="stylesheet" />

	<!-- Styles -->
	<link rel="stylesheet" th:href="@{/dashboard-admin.css}" />
</head>

<body>

	<!-- ================= SIDEBAR ================= -->
	<aside class="sidebar" id="sidebar">

		<!-- Logo -->
		<div class="sidebar-logo">
			<div class="logo-icon"></div>
			<span class="logo-text">CRM Portal</span>
		</div>

		<!-- Navigation -->
		<nav class="sidebar-nav">
			<p class="nav-label">Main</p>

			<a href="#" class="nav-item active"><span>Dashboard</span></a>
			<a href="#" class="nav-item"><span>Customers</span></a>
			<a href="#" class="nav-item"><span>Leads</span></a>
			<a href="#" class="nav-item"><span>Deals</span></a>
			<a href="#" class="nav-item"><span>Reports</span></a>

			<p class="nav-label">System</p>
			<a href="#" class="nav-item"><span>Products</span></a>
			<a href="#" class="nav-item"><span>Settings</span></a>
		</nav>

		<!-- Logout -->
		<div class="sidebar-footer">
			<form th:action="@{/logout}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<button type="submit" class="logout-btn">Logout</button>
			</form>
		</div>

	</aside>

	<!-- ================= MAIN ================= -->
	<div class="main-wrapper">

		<!-- Topbar -->
		<header class="topbar">
			<button class="hamburger" id="hamburger"></button>

			<div class="search-box">
				<input type="text" placeholder="Search..." />
			</div>

			<div class="topbar-right">
				<button class="notif-btn"></button>

				<div class="avatar-wrap">
					<div class="avatar">A</div>
					<div>
						<span th:text="${#authentication?.name ?: 'Admin'}">Admin</span>
						<small>Super Admin</small>
					</div>
				</div>
			</div>
		</header>

		<!-- Content -->
		<main class="content">

			<!-- Page Header -->
			<div class="page-header">
				<div>
					<h1>Dashboard</h1>
					<p>CRM overview</p>
				</div>
				<button class="btn-primary">Add New Lead</button>
			</div>

			<!-- KPI Cards -->
			<section class="kpi-grid">
				<div class="kpi-card">
					<p class="kpi-value">2,847</p>
					<p>Total Customers</p>
				</div>
				<div class="kpi-card">
					<p class="kpi-value">143</p>
					<p>Active Leads</p>
				</div>
				<div class="kpi-card">
					<p class="kpi-value">₹48.6L</p>
					<p>Revenue</p>
				</div>
				<div class="kpi-card">
					<p class="kpi-value">38</p>
					<p>Deals Closed</p>
				</div>
			</section>

			<!-- Table Section -->
			<section class="table-card">
				<h2>Recent Leads</h2>
				<table>
					<thead>
						<tr>
							<th>#</th>
							<th>Name</th>
							<th>Email</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td>001</td>
							<td>Ravi Kumar</td>
							<td>ravi@email.com</td>
							<td>New</td>
						</tr>
					</tbody>
				</table>
			</section>

		</main>
	</div>

	<!-- Scripts -->
	<script th:src="@{/dashboard-admin.js}"></script>

</body>

</html>
