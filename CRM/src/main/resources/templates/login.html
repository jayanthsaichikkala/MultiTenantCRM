<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CRM Login</title>


	<link rel="stylesheet" th:href="@{/login.css}" href="/login.css" />
</head>
<style>
	
</style>
<body>

	<div class="container">
		<h2> <span class="brand-crm">CRM</span> <span class="brand-login"> Login</span> </h2> <!-- Error Message -->
		<div th:if="${param.error}" class="alert alert-error"> Invalid username or password. </div>
		<!-- Logout Message -->
		<div th:if="${param.logout}" class="alert alert-success"> Logged out successfully. </div>
		<form th:action="@{/login}" method="post"> <input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<div class="form-group"> <label>Username</label> <input type="text" name="username"
					placeholder="Enter username" required> </div>
			<div class="form-group"> <label>Password</label> <input type="password" name="password"
					placeholder="Enter password" required> </div> <button type="submit">Login</button>
		</form>
	</div>
</body>

</html>
